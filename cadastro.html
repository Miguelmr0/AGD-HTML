<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AGD - Criar Conta</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="#1a3a6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="header-title">Criar Conta</div>
      <div class="header-spacer"></div>
    </div>

    <div class="logo-area">
      <img src="imagens/f670197c-f468-40c2-9514-41b285cd8a25.png" alt="logo AGD" class="logo-image"/>
      <div class="logo-text"></div>
      <div class="logo-subtitle">Inicie seu cadastro para o Vigilant Care</div>
    </div>

    <div class="cadastro">
      <div>
        <label>Nome Completo</label>
        <input type="text" placeholder="Digite seu nome completo"/>
      </div>
      <div>
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00"/>
      </div>
      <div>
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com"/>
      </div>
      <div>
        <label>Telefone</label>
        <input type="tel" placeholder="(00) 00000-0000"/>
      </div>
      <div>
        <label>Senha</label>
        <div class="password-wrap">
          <input type="password" placeholder="Mínimo 8 caracteres"/>
          <span class="eye-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="terms"/>
        <label for="terms">
          Eu concordo com os <a href="#">Termos de Uso</a> e a
          <a href="#">Política de Privacidade</a>.
        </label>
      </div>

      <button class="btn-primary">
        Criar Minha Conta
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </button>

      <div class="divider"></div>

      <div class="login-link">
        Já possui uma conta?
        <a href="#">Entre aqui →</a>
      </div>
    </div>

    <div class="version">Versão 1.2.0 · Vigilant Care Recife</div>
  </div>
</body>
</html>
